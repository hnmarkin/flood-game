<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SurgeCity General Header Mockup</title>
  <style>
    :root {
      --ink: #24313d;
      --paper: #edf5fa;
      --paper-dim: rgba(237, 245, 250, 0.18);
      --blue-0: #d8ebfb;
      --blue-1: #b8d7f2;
      --blue-2: #90b9dc;
      --blue-3: #5d84a8;
      --gold: #f2c14e;
      --green: #55c96e;
      --red: #d65353;
      --water: #47aee9;
      --shadow: rgba(12, 22, 31, 0.34);
      --font-ui: "Trebuchet MS", "Verdana", sans-serif;
      --font-pixel: "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font-ui);
      background: #163048;
      color: var(--paper);
      image-rendering: pixelated;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(9, 18, 28, 0.2), rgba(9, 18, 28, 0.72)),
        url("../Background_Image.png");
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: stretch;
      padding: 0;
    }

    .toolbar {
      width: 100%;
      min-height: 58px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 3px solid var(--ink);
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.3), transparent 42%),
        linear-gradient(to bottom, var(--blue-0), var(--blue-2));
      box-shadow:
        inset 0 -4px 0 rgba(36, 49, 61, 0.22),
        0 6px 16px var(--shadow);
    }

    .cluster {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .cluster.center {
      justify-content: center;
    }

    .cluster.right {
      justify-content: flex-end;
    }

    .chip,
    .icon-btn {
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 2px solid var(--ink);
      border-radius: 10px;
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.22), transparent 48%),
        rgba(237, 245, 250, 0.34);
      color: var(--ink);
      box-shadow: inset 0 -3px 0 rgba(93, 132, 168, 0.3);
      white-space: nowrap;
    }

    .chip.compact {
      padding: 0 8px;
      gap: 6px;
    }

    .icon-btn {
      min-width: 38px;
      justify-content: center;
      padding: 0 9px;
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.18), transparent 48%),
        rgba(237, 245, 250, 0.42);
    }

    .icon-btn.alert {
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.18), transparent 48%),
        rgba(242, 193, 78, 0.48);
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      position: relative;
      flex: 0 0 18px;
    }

    .icon.square {
      border: 2px solid currentColor;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
    }

    .icon.coin {
      border-radius: 50%;
      border: 2px solid currentColor;
      background: var(--gold);
    }

    .icon.trust {
      transform: rotate(45deg);
      border-radius: 4px;
      background: var(--green);
      border: 2px solid currentColor;
    }

    .icon.team {
      border-radius: 50%;
      background: var(--red);
      border: 2px solid currentColor;
    }

    .icon.team::after {
      content: "";
      position: absolute;
      left: 3px;
      right: 3px;
      bottom: -5px;
      height: 7px;
      border: 2px solid currentColor;
      border-top: 0;
      border-radius: 0 0 8px 8px;
      background: rgba(255, 255, 255, 0.18);
    }

    .icon.wave {
      overflow: hidden;
      border-radius: 4px;
      border: 2px solid currentColor;
      background: rgba(255, 255, 255, 0.18);
    }

    .icon.wave::before,
    .icon.wave::after {
      content: "";
      position: absolute;
      left: -2px;
      right: -2px;
      height: 4px;
      border-radius: 999px;
      background: var(--water);
    }

    .icon.wave::before {
      top: 5px;
    }

    .icon.wave::after {
      bottom: 4px;
    }

    .icon.clock {
      border-radius: 50%;
      border: 2px solid currentColor;
    }

    .icon.clock::before,
    .icon.clock::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 3px;
      width: 2px;
      background: currentColor;
      transform-origin: bottom center;
    }

    .icon.clock::before {
      height: 6px;
    }

    .icon.clock::after {
      top: 7px;
      height: 5px;
      transform: rotate(90deg);
    }

    .icon.pause::before,
    .icon.pause::after,
    .icon.menu::before,
    .icon.menu::after {
      content: "";
      position: absolute;
      top: 2px;
      bottom: 2px;
      width: 4px;
      border-radius: 2px;
      background: currentColor;
    }

    .icon.pause::before {
      left: 3px;
    }

    .icon.pause::after {
      right: 3px;
    }

    .icon.menu::before {
      left: 2px;
      right: 2px;
      top: 3px;
      bottom: auto;
      width: auto;
      height: 3px;
    }

    .icon.menu::after {
      left: 2px;
      right: 2px;
      top: 8px;
      bottom: auto;
      width: auto;
      height: 3px;
      box-shadow: 0 5px 0 currentColor;
    }

    .icon.alert {
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 16px solid var(--gold);
      flex-basis: 18px;
    }

    .icon.alert::after {
      content: "!";
      position: absolute;
      left: -2px;
      top: 4px;
      font: 700 10px/1 var(--font-pixel);
      color: var(--ink);
    }

    .divider {
      width: 2px;
      height: 28px;
      background: rgba(36, 49, 61, 0.2);
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .value {
      font: 700 18px/1 var(--font-pixel);
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    .tiny {
      font: 700 14px/1 var(--font-pixel);
      color: var(--ink);
      opacity: 0.88;
    }

    .scenario {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .cluster,
      .cluster.center,
      .cluster.right {
        justify-content: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="toolbar" aria-label="General toolbar mockup">
      <div class="cluster">
        <div class="chip compact">
          <span class="icon square" aria-hidden="true"></span>
          <span class="value scenario">Mobile / Sally</span>
        </div>
        <div class="chip compact">
          <span class="icon wave" aria-hidden="true"></span>
          <span class="tiny">PREP</span>
        </div>
      </div>

      <div class="cluster center">
        <div class="chip">
          <span class="icon clock" aria-hidden="true"></span>
          <span class="value">D03</span>
        </div>
        <div class="chip">
          <span class="icon clock" aria-hidden="true"></span>
          <span class="value">06:40</span>
        </div>
        <div class="divider" aria-hidden="true"></div>
        <div class="chip">
          <span class="icon coin" aria-hidden="true"></span>
          <span class="value">12450</span>
        </div>
        <div class="chip">
          <span class="icon trust" aria-hidden="true"></span>
          <span class="value">74</span>
        </div>
        <div class="chip">
          <span class="icon team" aria-hidden="true"></span>
          <span class="value">18</span>
        </div>
      </div>

      <div class="cluster right">
        <button class="icon-btn alert" type="button" aria-label="Alerts">
          <span class="icon alert" aria-hidden="true"></span>
        </button>
        <button class="icon-btn" type="button" aria-label="Pause">
          <span class="icon pause" aria-hidden="true"></span>
        </button>
        <button class="icon-btn" type="button" aria-label="Menu">
          <span class="icon menu" aria-hidden="true"></span>
        </button>
      </div>
    </header>
  </main>
</body>
</html>
