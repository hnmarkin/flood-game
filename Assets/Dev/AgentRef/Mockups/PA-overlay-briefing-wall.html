<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Prep Actions - Briefing Wall</title>
  <style>
    :root {
      --bg: #eef8ff;
      --panel: #fbfbff;
      --panel-2: #eef6ff;
      --paper: #f7fffb;
      --paper-2: #f5edff;
      --ink: #314153;
      --muted: #66768d;
      --line: rgba(100, 126, 170, 0.18);
      --accent: #62d4c7;
      --accent-2: #8f76ff;
      --danger: #ef7f9c;
      --good: #78d87d;
      --owned: #dff8e8;
      --shadow: rgba(140, 158, 198, 0.12);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-width: 1200px;
      min-height: 760px;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 14%, rgba(98, 212, 199, 0.36), transparent 22%),
        radial-gradient(circle at 82% 12%, rgba(143, 118, 255, 0.30), transparent 20%),
        radial-gradient(circle at 82% 82%, rgba(120, 216, 125, 0.24), transparent 18%),
        linear-gradient(180deg, #f8fbff 0%, #f1fff7 52%, #f6f0ff 100%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Verdana", system-ui, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.72) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.72) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      opacity: 0.30;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-rows: 74px 1fr 88px;
      gap: 14px;
      padding: 14px;
    }

    .topbar, .owned, .wall, .briefing, .footer, .action, .card, .mini-card, .note {
      border: 1px solid var(--line);
      box-shadow: 0 12px 22px var(--shadow);
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.50)), var(--panel);
      border-radius: 22px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background:
        linear-gradient(90deg, rgba(98, 212, 199, 0.26), rgba(143, 118, 255, 0.22), rgba(120, 216, 125, 0.20)),
        linear-gradient(180deg, rgba(255,255,255,0.90), rgba(255,255,255,0.56));
    }

    .topbar h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #35556c;
      text-shadow: 0 2px 0 rgba(255,255,255,0.88);
    }

    .topbar .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: right;
      font-weight: 700;
    }

    .main {
      display: grid;
      grid-template-columns: 250px 1fr 380px;
      gap: 14px;
      min-height: 0;
    }

    .owned {
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(98, 212, 199, 0.22), rgba(255,255,255,0.36)),
        var(--panel);
    }

    .kicker {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 10px;
      overflow: auto;
      padding-right: 4px;
    }

    .mini-card {
      padding: 12px;
      background: linear-gradient(180deg, rgba(120, 217, 200, 0.18), rgba(255,255,255,0.40)), var(--panel);
      background: linear-gradient(180deg, rgba(143, 118, 255, 0.16), rgba(255,255,255,0.42)), var(--panel);
    }

    .mini-card b {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .mini-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .wall {
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(143, 118, 255, 0.12), transparent 18%),
        radial-gradient(circle at 80% 100%, rgba(98, 212, 199, 0.12), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.42));
    }

    .board-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      overflow: auto;
      padding-right: 4px;
    }

    .card {
      position: relative;
      padding: 12px;
      min-height: 198px;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, outline-color 120ms ease;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.50)),
        var(--panel-2);
      border-radius: 20px;
      box-shadow:
        0 10px 0 rgba(120, 165, 214, 0.12),
        0 12px 18px rgba(140, 158, 198, 0.10);
    }

    .card:hover,
    .card.hovered {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .card.selected {
      outline: 3px solid var(--accent);
      outline-offset: 0;
    }

    .card.disabled {
      opacity: 0.72;
      filter: grayscale(0.10) brightness(0.98) saturate(0.92);
      cursor: not-allowed;
    }

    .card.owned {
      background:
        linear-gradient(180deg, rgba(143, 118, 255, 0.18), rgba(255,255,255,0.46)),
        var(--panel-2);
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(98, 212, 199, 0.20);
      color: #35556c;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .name {
      margin: 10px 0 8px;
      font-size: 21px;
      line-height: 1.08;
    }

    .costs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .costs div,
    .foot-chip {
      border-radius: 12px;
      background: rgba(255,255,255,0.72);
      padding: 8px 9px;
      text-align: center;
    }

    .costs small,
    .op-row small {
      display: block;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 2px;
    }

    .opinion-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .op-row {
      border-radius: 12px;
      padding: 8px 9px;
      text-align: center;
      background: rgba(255,255,255,0.74);
      font-weight: 700;
    }

    .op-row.res { background: rgba(120, 216, 125, 0.24); }
    .op-row.corp { background: rgba(98, 212, 199, 0.24); }
    .op-row.pol { background: rgba(143, 118, 255, 0.22); }

    .line {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #395063;
    }

    .line strong { color: #6a58d8; }

    .disabled-note {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      color: var(--danger);
      font-size: 12px;
      line-height: 1.2;
      text-align: center;
      display: none;
    }

    .card.disabled .disabled-note { display: block; }

    .briefing {
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 100% 0%, rgba(143, 118, 255, 0.16), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.48));
    }

    .briefing h2 {
      margin: 0;
      font-size: 31px;
      line-height: 1.05;
      color: #35556c;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .panel {
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.74);
    }

    .panel h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .panel p {
      margin: 0;
      line-height: 1.55;
    }

    .inspector-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .info {
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,0.74);
    }

    .info span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 1.15fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background:
        linear-gradient(90deg, rgba(98, 212, 199, 0.24), rgba(143, 118, 255, 0.22), rgba(120, 216, 125, 0.20)),
        linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.56));
    }

    .footer strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .footer .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .note {
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.52)), var(--panel);
    }

    .action {
      border: 0;
      padding: 14px 22px;
      border-radius: 999px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
      color: #2f4f73;
      background: linear-gradient(180deg, #b3f0ff, #c4b2ff);
      box-shadow: 0 8px 0 rgba(124, 132, 210, 0.22);
    }

    .action:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 1380px) {
      .main { grid-template-columns: 220px 1fr 330px; }
      .grid { grid-template-columns: 1fr; }
      .footer { grid-template-columns: 1fr; }
      .action { justify-self: start; }
      .inspector-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <h1>Preparation Actions</h1>
      <div class="meta">Month 1 / Turn 1</div>
      <div class="meta">Money 8 | AP 5 | Selected hover drives the briefing panel</div>
    </header>

    <main class="main">
      <aside class="owned">
        <div class="kicker"><span>Owned / Enacted</span><span id="ownedCount">2 active</span></div>
        <div class="stack" id="ownedStack"></div>
      </aside>

      <section class="wall">
        <div class="board-label"><span>Action wall</span><span>Selected / disabled / hover</span></div>
        <div class="grid" id="grid" aria-label="Preparation actions"></div>
      </section>

      <aside class="briefing">
        <h2 id="detailTitle"></h2>
        <div class="subtitle" id="detailType"></div>
        <div class="inspector-grid" id="detailTop"></div>
        <div class="panel">
          <h3>Mechanical effects</h3>
          <p id="detailEffects"></p>
        </div>
        <div class="panel">
          <h3>Real-world inspiration</h3>
          <p id="detailBasis"></p>
        </div>
        <div class="panel">
          <h3>Comms failure</h3>
          <p id="detailFailure"></p>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <div>
        <strong id="footerTitle"></strong>
        <div class="muted" id="footerType"></div>
      </div>
      <div class="note" id="footerNote"></div>
      <button class="action" id="enactButton" type="button">Enact</button>
    </footer>
  </div>

  <script>
    const actions = [
      { id: 'drainage', title: 'Drainage Maintenance Blitz', type: 'Program / O&M', money: 2, ap: 2, turns: 1, res: '+', corp: '+', pol: '+', effects: ['Drainage Efficiency +2'], failure: 'Card fails', basis: 'Storm-drain cleaning, inlet clearing, debris removal, and emergency repairs recover capacity before the next rain window.', stacks: 3 },
      { id: 'pump', title: 'Pump Stations + Backup Power', type: 'Project / Continuity', money: 5, ap: 5, turns: 2, res: '+', corp: '+', pol: '+', effects: ['Enables Pump Placement Menu', 'Drainage Efficiency +3'], failure: 'Pump failure chance in Crisis Phase', basis: 'Pumping assets with backup generators keep water moving when tides, surge, or outages block gravity drainage.', stacks: 2 },
      { id: 'storage', title: 'Detention / Underground Storage', type: 'Project / Storage', money: 5, ap: 5, turns: 4, res: 'Mixed', corp: '+', pol: '+', effects: ['Drainage Efficiency +3', 'External Water Load -2', 'Event Pacing -2'], failure: 'Effects x 1/2', basis: 'Detention basins and storage tunnels temporarily hold runoff and flatten peak flow.', stacks: 2 },
      { id: 'code', title: 'Flood-Resistant Building Code Upgrade', type: 'Policy / Standards', money: 2, ap: 3, turns: 4, res: 'Mixed / -', corp: '-', pol: 'Mixed', effects: ['Base Infrastructure Resilience +3', 'Wind Stress -1'], failure: 'Card fails', basis: 'Floodplain codes and elevation standards reduce future loss, but they raise development costs today.', stacks: 1 },
      { id: 'warning', title: 'Early Warning & Risk Communication', type: 'Operations / Communication', money: 2, ap: 1, turns: 3, res: '+', corp: '+', pol: '+', effects: ['Communication +3', 'Event Pacing -3'], failure: 'N/A', basis: 'Forecasts, alert channels, trusted messengers, and multilingual messaging improve protective action.', stacks: 1 },
      { id: 'tax', title: 'Municipal Tax Increase', type: 'Policy / Revenue', money: -3, ap: 1, turns: 1, res: '--', corp: '--', pol: '-', effects: ['Money +3', 'Outrage +1'], failure: 'Outrage +1 (2 total)', basis: 'Taxes, fees, and bonds fund resilience work, but the political cost is immediate.', stacks: 1 }
    ];

    const state = {
      selected: 'pump',
      hover: 'warning',
      money: 8,
      ap: 5,
      owned: ['drainage', 'warning']
    };

    const el = (id) => document.getElementById(id);

    function costText(action) {
      return action.money < 0 ? `+$${Math.abs(action.money)}` : `-$${action.money}`;
    }

    function canAfford(action) {
      return state.money - Math.max(0, action.money) >= 0 && state.ap - action.ap >= 0 && ownedCount(action.id) < action.stacks;
    }

    function ownedCount(id) {
      return state.owned.filter((item) => item === id).length;
    }

    function selectedAction() {
      return actions.find((item) => item.id === state.selected) || actions[0];
    }

    function hoverAction() {
      return actions.find((item) => item.id === state.hover) || selectedAction();
    }

    function cardMarkup(action) {
      const classes = [
        'card',
        action.id === state.selected ? 'selected' : '',
        action.id === state.hover ? 'hovered' : '',
        state.owned.includes(action.id) ? 'owned' : '',
        canAfford(action) ? '' : 'disabled'
      ].filter(Boolean).join(' ');

      const ownedText = ownedCount(action.id) >= action.stacks ? 'Owned / stack limit reached' : state.owned.includes(action.id) ? 'Owned' : 'Ready';

      return `
        <article class="${classes}" data-id="${action.id}">
          <span class="chip">${action.type}</span>
          <h3 class="name">${action.title}</h3>
          <div class="costs">
            <div><small>Money</small>${costText(action)}</div>
            <div><small>AP</small>${action.ap}</div>
            <div><small>Turns</small>${action.turns}</div>
          </div>
          <div class="opinion-row">
            <div class="op-row res"><small>Residential</small>${action.res}</div>
            <div class="op-row corp"><small>Corporate</small>${action.corp}</div>
            <div class="op-row pol"><small>Political</small>${action.pol}</div>
          </div>
          <p class="line"><strong>Effects:</strong> ${action.effects.join(' | ')}</p>
          <p class="line"><strong>Comms failure:</strong> ${action.failure}</p>
          <div class="disabled-note">${ownedText}</div>
        </article>`;
    }

    function renderOwned() {
      el('ownedCount').textContent = `${state.owned.length} active`;
      el('ownedStack').innerHTML = state.owned.map((id) => {
        const action = actions.find((item) => item.id === id);
        return `
          <div class="mini-card">
            <b>${action.title}</b>
            <span>${action.type}<br>${action.effects.join(' | ')}<br>${action.failure}</span>
          </div>`;
      }).join('');
    }

    function renderGrid() {
      el('grid').innerHTML = actions.map(cardMarkup).join('');
      el('grid').querySelectorAll('.card').forEach((node) => {
        node.addEventListener('click', () => {
          state.selected = node.dataset.id;
          render();
        });
        node.addEventListener('mouseenter', () => {
          state.hover = node.dataset.id;
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const action = hoverAction();
      el('detailTitle').textContent = action.title;
      el('detailType').textContent = action.type;
      el('detailTop').innerHTML = [
        infoBlock('Money / AP / Turn', `${action.money < 0 ? '+' : ''}$${Math.abs(action.money)} / ${action.ap} AP / ${action.turns}T`),
        infoBlock('Opinion shift', `${action.res} Residential | ${action.corp} Corporate | ${action.pol} Political`),
        infoBlock('Status', state.hover === state.selected ? 'Selected and hovered' : 'Hover preview')
      ].join('');
      el('detailEffects').textContent = action.effects.join('; ');
      el('detailBasis').textContent = action.basis;
      el('detailFailure').textContent = action.failure;
      el('footerTitle').textContent = action.title;
      el('footerType').textContent = `${action.type} | selected ${state.selected === action.id ? 'yes' : 'no'}`;
      el('footerNote').textContent = state.hover === state.selected
        ? 'Selected card is pinned in the briefing panel.'
        : `Hovering ${action.title} is temporarily overriding the brief.`;
      el('enactButton').disabled = !canAfford(selectedAction());
    }

    function infoBlock(label, value) {
      return `<div class="info"><span>${label}</span>${value}</div>`;
    }

    function enactSelected() {
      const action = selectedAction();
      if (!canAfford(action)) return;
      state.money -= Math.max(0, action.money);
      state.ap -= action.ap;
      state.owned.unshift(action.id);
      render();
    }

    function render() {
      renderOwned();
      renderGrid();
      renderDetail();
    }

    el('enactButton').addEventListener('click', enactSelected);
    render();
  </script>
</body>
</html>
